<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Clock</title>
    <link rel="icon" href="watch-508271_1280.png" type="image/png">
</head>

<body>

    <main class="d-flex align-items-center justify-content-center bg-black">

        <div class="main-div" >

            <!-- <svg id="sec-svg" hight="90%" width="90%" viewbox="0 0 100 100" >
                <circle id="sec-cir" cy="50%" cx="50%" r="45" pathLength="60" ></circle>
            </svg>

            <div id="sec-pointer" ></div> -->

            <div class="clock-div">
                <span id="date" class="text-white border rounded-pill px-1" >00-00-0000</span>
                <div class="circle"></div>
                <div id="hours" class="rounded-pill"></div>
                <div id="minutes" class="rounded-pill"></div>
                <div id="seconds" class="rounded-pill"></div>
    
                <div class="num" style="--i:1;"><span>1</span></div>
                <div class="num" style="--i:2;"><span>2</span></div>
                <div class="num" style="--i:3;"><span>3</span></div>
                <div class="num" style="--i:4;"><span>4</span></div>
                <div class="num" style="--i:5;"><span>5</span></div>
                <div class="num" style="--i:6;"><span>6</span></div>
                <div class="num" style="--i:7;"><span>7</span></div>
                <div class="num" style="--i:8;"><span>8</span></div>
                <div class="num" style="--i:9;"><span>9</span></div>
                <div class="num" style="--i:10;"><span>10</span></div>
                <div class="num" style="--i:11;"><span>11</span></div>
                <div class="num" style="--i:12;"><span>12</span></div>
            </div>
        </div>

    </main>

    <script src="index.js"></script>
</body>

</html>
